<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Garden Towers — Partner Shipment Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"DM Sans",sans-serif;background:#f2f7f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px;}
  .card{background:#fff;border-radius:16px;border:1px solid rgba(0,105,83,0.15);box-shadow:0 4px 16px rgba(0,0,0,0.07);width:100%;max-width:540px;overflow:hidden;}
  .card-header{background:linear-gradient(135deg,#006953,#007a60);padding:24px 28px;text-align:center;}
  .card-header img{width:120px;height:auto;margin-bottom:12px;filter:brightness(0) invert(1);}
  .card-header h1{color:#fff;font-size:20px;font-weight:700;margin-bottom:4px;}
  .card-header p{color:rgba(255,255,255,0.8);font-size:13px;}
  .card-body{padding:24px 28px;}
  .partner-badge{display:inline-flex;align-items:center;gap:6px;background:#c6e5b9;color:#006953;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:20px;}
  .form-row{margin-bottom:16px;}
  .form-label{display:block;font-size:11px;font-weight:600;color:#5a7a6a;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .form-input{width:100%;padding:10px 12px;border:1.5px solid rgba(0,105,83,0.2);border-radius:8px;font-size:14px;font-family:inherit;background:#f4f9f6;color:#1a2e2a;outline:none;transition:border-color .15s;}
  .form-input:focus{border-color:#006953;background:#fff;box-shadow:0 0 0 3px rgba(0,105,83,0.1);}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn{width:100%;padding:12px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,#006953,#007a60);color:#fff;box-shadow:0 4px 12px rgba(0,105,83,0.3);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,105,83,0.4);}
  .success-box{display:none;text-align:center;padding:32px 24px;}
  .success-icon{font-size:48px;margin-bottom:12px;}
  .success-title{font-size:20px;font-weight:700;color:#006953;margin-bottom:8px;}
  .success-sub{font-size:14px;color:#5a7a6a;line-height:1.5;}
  .error-msg{background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .current-stock{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#166534;}
</style>
</head>

    <h1>Partner Shipment Report</h1>
    <p>Report outbound tower shipments to communities</p>
  </div>
  <div class="card-body">
    <div id="partner-badge" class="partner-badge">🌏 Loading...</div>
    <div id="current-stock" class="current-stock" style="display:none;"></div>
    <div id="error-msg" class="error-msg"></div>

    <div id="form-area">
      <div class="form-row">
        <label class="form-label">Date shipped</label>
        <input type="date" class="form-input" id="ship-date"/>
      </div>
      <div class="form-row">
        <label class="form-label">Recipient name / organization</label>
        <input type="text" class="form-input" id="recipient" placeholder="Who are the towers going to?"/>
      </div>
      <div class="form-row">
        <label class="form-label">Destination (city, country)</label>
        <input type="text" class="form-input" id="destination" placeholder="e.g. Cebu City, Philippines"/>
      </div>
      <div class="form-row">
        <label class="form-label">Number of sewn sacks shipped</label>
        <input type="number" class="form-input" id="qty-shipped" min="1" placeholder="0"/>
      </div>
      <div class="grid-2">
        <div class="form-row">
          <label class="form-label">Tracking number</label>
          <input type="text" class="form-input" id="tracking" placeholder="Optional"/>
        </div>
        <div class="form-row">
          <label class="form-label">Shipping cost ($)</label>
          <input type="number" class="form-input" id="ship-cost" min="0" step="0.01" placeholder="0.00"/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="notes" rows="2" placeholder="Any additional info about this shipment..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="submitReport()">Submit shipment report</button>
    </div>

    <div id="success-area" class="success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Shipment reported!</div>
      <div class="success-sub" id="success-msg">Your shipment has been recorded and inventory has been updated.</div>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="resetForm()">Report another shipment</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://mroyqkvrzrcmnfgvylkl.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yb3lxa3ZyenJjbW5mZ3Z5bGtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDkwNjAsImV4cCI6MjA5MTkyNTA2MH0.sG0fRMSFHvrlr3dDHowAUjdtaZZbWWhlFbiEoIYOj0s';
const HDR={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};

const PARTNERS={
  pearl:{name:'Project Pearl (Philippines)',locationId:'pearl_sacks',icon:'🌏'},
  oltl:{name:'One Life to Love (Baja)',locationId:'oltl_sacks',icon:'🌎'},
};

let partner=null;
let currentStock=0;

async function init(){
  const params=new URLSearchParams(window.location.search);
  const slug=params.get('partner');
  partner=PARTNERS[slug];

  if(!partner){
    document.getElementById('partner-badge').textContent='❌ Invalid partner link';
    document.getElementById('form-area').innerHTML='<p style="color:#991b1b;text-align:center;">This link is not valid. Please contact USANA Foundation for your partner link.</p>';
    return;
  }

  document.getElementById('partner-badge').innerHTML=partner.icon+' '+partner.name;
  document.getElementById('ship-date').value=new Date().toISOString().split('T')[0];

  // Load current stock
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/gt_inventory?location_id=eq.${partner.locationId}`,{headers:HDR});
    const data=await r.json();
    if(data&&data[0]){
      currentStock=data[0].stock_level||0;
      const stockEl=document.getElementById('current-stock');
      stockEl.style.display='block';
      stockEl.innerHTML='<strong>Current sewn sacks on hand:</strong> '+currentStock.toLocaleString()+' units';
    }
  }catch(e){console.log('Could not load stock');}
}

async function submitReport(){
  const recipient=document.getElementById('recipient').value.trim();
  const destination=document.getElementById('destination').value.trim();
  const qty=parseInt(document.getElementById('qty-shipped').value)||0;
  const date=document.getElementById('ship-date').value;
  const tracking=document.getElementById('tracking').value.trim();
  const cost=parseFloat(document.getElementById('ship-cost').value)||0;
  const notes=document.getElementById('notes').value.trim();
  const errEl=document.getElementById('error-msg');

  errEl.style.display='none';

  if(!recipient||!destination||!qty||!date){
    errEl.textContent='Please fill in date, recipient, destination, and quantity.';
    errEl.style.display='block';return;
  }
  if(qty>currentStock&&currentStock>0){
    errEl.textContent='Cannot ship '+qty+' — only '+currentStock+' sacks on hand.';
    errEl.style.display='block';return;
  }

  try{
    // Log the partner shipment
    await fetch(`${SUPABASE_URL}/rest/v1/gt_partner_shipments`,{
      method:'POST',
      headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({
        partner_name:partner.name,
        location_id:partner.locationId,
        date_shipped:date,
        recipient_name:recipient,
        destination:destination,
        qty_shipped:qty,
        tracking_number:tracking,
        shipping_cost:cost,
        notes:notes
      })
    });

    // Subtract from inventory
    const newQty=Math.max(0,currentStock-qty);
    await fetch(`${SUPABASE_URL}/rest/v1/gt_inventory?location_id=eq.${partner.locationId}`,{
      method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({stock_level:newQty})
    });

    // Log to movement log
    await fetch(`${SUPABASE_URL}/rest/v1/gt_inventory_log`,{
      method:'POST',
      headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({
        location_id:partner.locationId,
        location_name:partner.name,
        item_type:'Sewn Sacks',
        change_qty:-qty,
        new_qty:newQty,
        notes:'Partner outbound: '+qty+' sacks to '+recipient+', '+destination+(tracking?' ('+tracking+')':'')
      })
    });

    document.getElementById('success-msg').textContent=
      qty+' sacks shipped to '+recipient+' in '+destination+'. New balance: '+newQty+' sacks remaining.';
    document.getElementById('form-area').style.display='none';
    document.getElementById('success-area').style.display='block';
    currentStock=newQty;
  }catch(e){
    errEl.textContent='Error submitting: '+e.message+'. Please try again.';
    errEl.style.display='block';
  }
}

function resetForm(){
  document.getElementById('form-area').style.display='block';
  document.getElementById('success-area').style.display='none';
  document.getElementById('error-msg').style.display='none';
  ['recipient','destination','qty-shipped','tracking','ship-cost','notes'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  const stockEl=document.getElementById('current-stock');
  stockEl.innerHTML='<strong>Current sewn sacks on hand:</strong> '+currentStock.toLocaleString()+' units';
}

init();
</script>
</body>
</html>
